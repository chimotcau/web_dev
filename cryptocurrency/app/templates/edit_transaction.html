<!DOCTYPE html>
<html>
<head>
    <title>Edit Transaction</title>
</head>
<body>
    <h1>Edit Transaction</h1>

    <form method="POST">
        <label>Type:</label>
        <select name="type">
            <option value="BUY" {% if tx.type == "BUY" %}selected{% endif %}>BUY</option>
            <option value="SELL" {% if tx.type == "SELL" %}selected{% endif %}>SELL</option>
        </select>
        <br><br>

        <label>Symbol:</label>
        <input type="text" name="symbol" value="{{ tx.symbol }}" required>
        <br><br>

        <label>Quantity:</label>
        <input type="number" step="any" name="quantity" value="{{ tx.quantity }}" required>
        <br><br>

        <label>Price:</label>
        <input type="number" step="any" name="price" value="{{ tx.price }}" required>
        <br><br>

        <label>Fee:</label>
        <input type="number" step="any" name="fee" value="{{ tx.fee }}" required>
        <br><br>

        <label>Date:</label>
        <input type="date" name="timestamp" value="{{ tx.timestamp.strftime('%Y-%m-%d') }}" required>
        <br><br>

        <label>Exchange:</label>
        <input type="text" name="exchange" value="{{ tx.exchange }}">
        <br><br>

        <label>Note:</label>
        <input type="text" name="note" value="{{ tx.note }}">
        <br><br>

        <button type="submit">Update</button>
    </form>

    <br>
    <a href="{{ url_for('main.transactions') }}">Back</a>
</body>
</html>
